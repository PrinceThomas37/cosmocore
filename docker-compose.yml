services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cosmocore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/cosmocore
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWISSEPH_PATH: /app/ephe
    volumes:
      - ./backend/ephe:/app/ephe
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: celery -A celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/cosmocore
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWISSEPH_PATH: /app/ephe
    volumes:
      - ./backend/ephe:/app/ephe
    depends_on:
      - postgres
      - redis

  beat:
    build: ./backend
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/cosmocore
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWISSEPH_PATH: /app/ephe
    depends_on:
      - redis
      - worker

volumes:
  pgdata:
